name: viewfinder
description: "Modern Flutter photo viewer / gallery. Pinch / double-tap / mouse-wheel zoom with rubber-band edges and fling, drag-to-dismiss, thumbnails, page indicator, and keyboard shortcuts."
version: 0.1.0
repository: https://github.com/koji-1009/viewfinder

topics:
  - photo
  - gallery
  - image-viewer
  - zoom
  - thumbnails

screenshots:
  - description: Pinch and double-tap zoom on a full-screen photo.
    path: doc/screenshots/zoom.webp
  - description: Swipe between pages with the thumbnail strip auto-scrolling and re-highlighting.
    path: doc/screenshots/swipe.webp

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3
  dapper: ^1.4.0

flutter:
