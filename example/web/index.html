<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Live demo of viewfinder, a photo viewer for Flutter: pinch / double-tap / rotation zoom, drag-to-dismiss, thumbnail strip, page indicator, and keyboard shortcuts.">
  <meta name="theme-color" content="#3B6EA5">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="viewfinder demo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>viewfinder demo</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #14181c;
      }
    }
    /* Pre-bootstrap loading indicator. Flutter paints over #loading on
       its first frame, replacing this spinner. */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      color: #3B6EA5;
    }
    #loading .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(59, 110, 165, 0.25);
      border-top-color: #3B6EA5;
      border-radius: 50%;
      animation: viewfinder-spin 0.9s linear infinite;
    }
    #loading .label {
      font-size: 15px;
      letter-spacing: 0.02em;
    }
    @keyframes viewfinder-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="label">Loading viewfinder demo…</div>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
